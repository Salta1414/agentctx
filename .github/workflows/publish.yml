name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Publish @niryn/agentctx-spec
        run: pnpm --filter @niryn/agentctx-spec publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @niryn/scanner
        run: pnpm --filter @niryn/scanner publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
